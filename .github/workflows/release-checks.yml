name: Release checks

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-validation:
    name: Full validation suite
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testing
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: ''
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      MAIL_MAILER: array
      ADMIN_LOGIN: admin@example.com
      ADMIN_PASSWORD: asdasdasd
      SUPER_ADMIN_LOGIN: kontakt@letscode.it
      SUPER_ADMIN_PASSWORD: tgbujmghj

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: mbstring, pdo_mysql

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          npm run build

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Run Laravel tests
        run: php artisan test

      - name: Run static analysis
        run: composer analyse

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Match ChromeDriver for installed Chrome
        run: php artisan dusk:chrome-driver --detect

      - name: Start Laravel server
        run: php artisan serve --host=127.0.0.1 --port=8000 > storage/logs/laravel-server.log 2>&1 &

      - name: Wait for application
        run: |
          for i in {1..30}; do
            if curl -fsS "$APP_URL" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time."
          exit 1

      - name: Run Dusk tests
        run: php artisan dusk

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-check-artifacts
          path: |
            tests/Browser/screenshots
            tests/Browser/console
            storage/logs
          if-no-files-found: ignore
